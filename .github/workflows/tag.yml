name: Tag

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag_created: ${{ steps.tag_exists.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_exists
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

  publish:
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
